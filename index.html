<!DOCTYPE html>
<html>
  <head>
    <title>Connexion RIFEL...</title>
  </head>
  <body>
    <h1>Connexion en cours, veuillez patienter...</h1>
    <script>
      // 1. On récupère le code envoyé par Discord dans l'URL
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');

      if (code) {
        // 2. On redirige vers ton protocole personnalisé pour ouvrir ton launcher
        window.location.href = "rifel://callback?code=" + code;
      } else {
        document.body.innerHTML = "<h1>Erreur : Aucun code reçu de Discord.</h1>";
      }
    </script>
  </body>
</html>
